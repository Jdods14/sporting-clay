<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8">
  <title>Loading…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Cache-busting: bump ?v=N on style.css, config.js, and script.js below
       whenever you publish a change you want users to see without a hard
       refresh. The number is arbitrary; just change it from the previous value. -->
  <link rel="stylesheet" href="style.css?v=3">
  <link rel="icon" type="image/png" href="favicon.png">
  <script src="config.js?v=3"></script>
</head>


<body>
  <header class="event-header">
    <div class="event-logo-container">
      <img id="event-logo" alt="Event Logo" class="event-logo">
    </div>
    <div class="event-title">
      <h2 id="event-title"></h2>
      <h4 id="event-subtitle"></h4>
      <p class="event-subtitle"><span id="scores-label"></span> | <span id="event-date"></span></p>
    </div>
  </header>

  <div id="archive-link" class="archive-link"></div>

  <div class="score-toggle" id="score-toggle"></div>

  <div class="leaderboards">
    <div class="board">
      <h2>🏆 Teams</h2>
      <div id="team-board">Loading...</div>
    </div>
    <div class="board">
      <h2>🏅 Individuals</h2>
      <p id="individual-note" class="board-note" style="display: none;">* Not part of official scoring</p>
      <div id="individual-board">Loading...</div>
    </div>
  </div>

  <div class="partner-strip-container">
    <div class="partner-strip" id="partner-strip">
      <!-- Logos will be injected here by JS -->
    </div>
  </div>

  <script src="script.js?v=3"></script>
</body>


</html>
